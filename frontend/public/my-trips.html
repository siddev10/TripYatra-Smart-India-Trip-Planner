<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Trips — TripYatra</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
  .page-wrap { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
  .back-link { display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:0.85rem;text-decoration:none;margin-bottom:24px;transition:color 0.2s; }
  .back-link:hover { color:var(--text); }
  .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:32px; }
  .page-header h1 { font-size:1.9rem;font-weight:800;letter-spacing:-0.5px; }

  .trip-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:22px 24px; margin-bottom:14px;
    display:flex; align-items:center; gap:18px;
    animation: fadeUp 0.3s ease both; transition: border-color 0.2s;
  }
  .trip-card:hover { border-color: var(--border2); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .trip-icon {
    width: 52px; height: 52px; border-radius:14px; flex-shrink:0;
    background:rgba(249,115,22,0.1); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:1.4rem;
  }
  .trip-body { flex:1; min-width:0; }
  .trip-route { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800; }
  .trip-meta-row { display:flex; flex-wrap:wrap; gap:14px; margin-top:6px; }
  .trip-meta-item { font-size:0.78rem; color:var(--text2); display:flex; align-items:center; gap:4px; }
  .trip-actions { display:flex; gap:8px; flex-shrink:0; }
  .status-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .status-planned  { background:rgba(96,165,250,0.12); color:var(--blue); }
  .status-upcoming { background:rgba(249,115,22,0.12); color:var(--accent); }
  .status-past     { background:rgba(71,85,105,0.2); color:var(--text3); }
  .empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
  .empty-state .big { font-size:3.5rem; margin-bottom:16px; opacity:0.4; }
  .filter-row { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .filter-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:'Plus Jakarta Sans',sans-serif; font-size:0.82rem; cursor:pointer; transition:all 0.18s; }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* Modal Styles */
  .modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); overflow-y: auto;
  }
  .modal-content {
    background: var(--surface); border: 1px solid var(--border2);
    width: 90%; max-width: 800px; margin: 60px auto; border-radius: 24px;
    padding: 40px; position: relative; animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .close-modal {
    position: absolute; right: 24px; top: 24px; font-size: 1.5rem; color: var(--text3);
    cursor: pointer; transition: color 0.2s;
  }
  .close-modal:hover { color: var(--text); }
  
  /* Itinerary specific styles in modal */
  .itinerary-summary { margin-bottom: 32px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .sum-item { background: var(--surface2); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
  .sum-label { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 4px; }
  .sum-value { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: var(--text); }
  
  .day-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px; overflow: hidden; }
  .day-head { padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: var(--surface3); }
  .day-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800; }
  .day-events { padding: 12px 24px 20px; display: none; }
  .day-card.open .day-events { display: block; }
  .event-item { display: flex; gap: 20px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .event-item:last-child { border-bottom: none; }
  .event-time { font-size: 0.78rem; font-weight: 700; color: var(--accent); min-width: 75px; flex-shrink: 0; }
  .event-act { font-size: 0.88rem; color: var(--text2); line-height: 1.5; }
</style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
  <a href="/dashboard.html" class="back-link">← Back to Dashboard</a>

  <div class="page-header">
    <h1>📋 My Trips</h1>
    <a href="/plan-trip.html" class="btn btn-primary">+ Plan New Trip</a>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All Trips</button>
    <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="setFilter('past', this)">Past</button>
  </div>

  <div id="tripsContainer">
    <div style="text-align:center;padding:40px;color:var(--text2)"><span class="spinner"></span></div>
  </div>
</div>

<!-- Itinerary Modal -->
<div id="itineraryModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeItinerary()">&times;</span>
    <div id="itineraryContent"></div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavbar('trips');

  let allTrips = [];
  let currentFilter = 'all';

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTrips();
  }

  function getStatus(trip) {
    const d = new Date(trip.date);
    const today = new Date(); today.setHours(0,0,0,0);
    if (d < today) return 'past';
    if (d.toDateString() === today.toDateString()) return 'upcoming';
    return 'planned';
  }

  function renderTrips() {
    const container = document.getElementById('tripsContainer');
    let filtered = allTrips;
    if (currentFilter === 'upcoming') filtered = allTrips.filter(t => getStatus(t) !== 'past');
    if (currentFilter === 'past')     filtered = allTrips.filter(t => getStatus(t) === 'past');

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="big">🏝️</div>
          <p style="font-size:1rem;color:var(--text2)">No trips found</p>
          <a href="/plan-trip.html" class="btn btn-primary" style="margin-top:20px">Plan a Trip</a>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map((t, i) => {
      const status = getStatus(t);
      const statusLabel = status === 'past' ? 'Completed' : status === 'upcoming' ? 'Upcoming' : 'Planned';
      return `
        <div class="trip-card" style="animation-delay:${i*0.06}s">
          <div class="trip-icon">🚂</div>
          <div class="trip-body">
            <div class="trip-route">${t.source} → ${t.destination}</div>
            <div class="trip-meta-row">
              <span class="trip-meta-item">📅 ${formatDate(t.date)}</span>
              <span class="trip-meta-item">👥 ${t.travellers} traveller${t.travellers>1?'s':''}</span>
              ${t.budget ? `<span class="trip-meta-item">💰 ₹${t.budget} budget</span>` : ''}
              ${t.notes ? `<span class="trip-meta-item">📝 ${t.notes}</span>` : ''}
              <span class="status-badge status-${status}">${statusLabel}</span>
            </div>
          </div>
          <div class="trip-actions">
            ${t.itinerary ? `<button class="btn btn-primary" style="font-size:0.8rem;padding:7px 14px" onclick="viewItinerary(${t.id})">View Itinerary</button>` : ''}
            <button class="btn btn-secondary" style="font-size:0.8rem;padding:7px 14px" 
                    onclick="window.location.href='/map-view.html?from=${t.source_coords}&to=${t.dest_coords}&src=${encodeURIComponent(t.source)}&dst=${encodeURIComponent(t.destination)}'">
              View Route
            </button>
            <a href="/train-search.html?src=${encodeURIComponent(t.source)}&dst=${encodeURIComponent(t.destination)}&date=${t.date}"
               class="btn btn-ghost" style="font-size:0.8rem;padding:7px 14px">View Trains</a>
            <button class="btn btn-danger" style="font-size:0.8rem;padding:7px 14px" onclick="deleteTrip(${t.id})">Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  function viewItinerary(tripId) {
    const trip = allTrips.find(t => t.id === tripId);
    if (!trip || !trip.itinerary) return;

    const s = trip.summary || { source: trip.source, destination: trip.destination, days: trip.itinerary.length, travellers: trip.travellers, budget: trip.budget };
    
    const html = `
      <div class="page-header" style="margin-bottom:24px">
        <h1>✨ Trip Itinerary</h1>
      </div>
      <div class="itinerary-summary">
        <div class="summary-grid">
          <div class="sum-item"><div class="sum-label">Route</div><div class="sum-value">${s.source} → ${s.destination}</div></div>
          <div class="sum-item"><div class="sum-label">Duration</div><div class="sum-value">${s.days} Days</div></div>
          <div class="sum-item"><div class="sum-label">Travellers</div><div class="sum-value">${s.travellers}</div></div>
          <div class="sum-item"><div class="sum-label">Budget</div><div class="sum-value">₹${s.budget?.toLocaleString('en-IN')}</div></div>
        </div>
        
        <div class="section-title" style="margin-bottom:16px; font-weight:800; font-size:1.2rem; font-family:'Syne',sans-serif;">Day-by-Day Plan</div>
        ${trip.itinerary.map(day => `
          <div class="day-card">
            <div class="day-head" onclick="this.parentElement.classList.toggle('open')">
              <div class="day-title">${day.title}</div>
              <div style="color:var(--text3)">▼</div>
            </div>
            <div class="day-events">
              ${day.events.map(e => `
                <div class="event-item">
                  <div class="event-time">${e.time}</div>
                  <div class="event-act">${e.activity}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    
    document.getElementById('itineraryContent').innerHTML = html;
    document.getElementById('itineraryModal').style.display = 'block';
    document.body.style.overflow = 'hidden'; // Prevent scrolling background
  }

  function closeItinerary() {
    document.getElementById('itineraryModal').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById('itineraryModal');
    if (event.target == modal) closeItinerary();
  }

  async function loadTrips() {
    try {
      const { trips } = await api.get('/trips');
      allTrips = trips;
      renderTrips();
    } catch(e) {
      showToast('Could not load trips', 'error');
    }
  }

  async function deleteTrip(id) {
    if (!confirm('Delete this trip?')) return;
    try {
      await api.delete(`/trips/${id}`);
      allTrips = allTrips.filter(t => t.id !== id);
      renderTrips();
      showToast('Trip deleted', 'info');
    } catch(e) {
      showToast(e.message, 'error');
    }
  }

  loadTrips();
</script>
</body>
</html>
