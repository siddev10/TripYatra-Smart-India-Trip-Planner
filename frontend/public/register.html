<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register — TripYatra</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  body::before {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse at 30% 30%, rgba(96,165,250,0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(249,115,22,0.1) 0%, transparent 50%);
    pointer-events:none;
  }
  .auth-wrap { width:100%; max-width:460px; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .auth-logo { text-align:center; margin-bottom:32px; font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; letter-spacing:-1px; }
  .auth-logo span { color:var(--accent); }
  .auth-logo p { font-family:'Plus Jakarta Sans',sans-serif; font-size:0.9rem; color:var(--text2); font-weight:400; margin-top:4px; }
  .auth-card { background:var(--surface); border:1px solid var(--border2); border-radius:20px; padding:36px; }
  .auth-title { font-size:1.4rem; font-weight:800; margin-bottom:6px; }
  .auth-sub { font-size:0.88rem; color:var(--text2); margin-bottom:28px; }
  .auth-switch { text-align:center; font-size:0.88rem; color:var(--text2); margin-top:20px; }
  .auth-switch a { color:var(--accent); text-decoration:none; font-weight:600; }
  .error-msg { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.25); border-radius:8px; padding:10px 14px; font-size:0.85rem; color:var(--red); margin-bottom:16px; display:none; }
  .strength-bar { height:3px; border-radius:2px; background:var(--border); margin-top:6px; overflow:hidden; }
  .strength-fill { height:100%; width:0; transition:width 0.3s,background 0.3s; border-radius:2px; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">Trip<span>Yatra</span><p>Start planning smarter journeys</p></div>
  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free forever. No credit card needed.</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input class="form-control" type="text" id="name" placeholder="Rahul Sharma" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)" autocomplete="new-password"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <button class="btn btn-primary w-full btn-lg" id="regBtn" onclick="doRegister()">
      Create Account
    </button>

    <div class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  Auth.requireGuest();
  document.addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const len = val.length;
    if (len < 4)      { fill.style.width='25%'; fill.style.background='var(--red)'; }
    else if (len < 7) { fill.style.width='60%'; fill.style.background='var(--yellow)'; }
    else              { fill.style.width='100%'; fill.style.background='var(--green)'; }
  }

  async function doRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('regBtn');

    document.getElementById('errorMsg').style.display = 'none';
    if (!name || !email || !password) { showErr('Please fill in all fields'); return; }
    if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      const data = await api.post('/auth/register', { name, email, password });
      Auth.setSession(data.token, data.user);
      showToast('Account created! Welcome, ' + data.user.name, 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 700);
    } catch(e) {
      showErr(e.message);
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
