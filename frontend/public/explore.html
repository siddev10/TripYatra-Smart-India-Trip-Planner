<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Explore India — TripYatra</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
  .page-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
  .back-link { display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:0.85rem;text-decoration:none;margin-bottom:24px; }
  .back-link:hover{color:var(--text);}
  .page-header { margin-bottom: 36px; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .page-header h1{font-size:2rem;font-weight:800;letter-spacing:-0.5px;}
  .page-header p{color:var(--text2);margin-top:6px;}

  .dest-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
  .dest-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
    transition:all 0.25s; cursor:pointer;
    animation:fadeUp 0.4s ease both;
  }
  .dest-card:hover { border-color:var(--border2); transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.35); }
  .dest-emoji-banner {
    height:100px; display:flex; align-items:center; justify-content:center;
    font-size:3.5rem; background:var(--surface2);
  }
  .dest-body { padding:18px 20px; }
  .dest-name { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; }
  .dest-state { font-size:0.78rem; color:var(--text2); margin:3px 0 10px; }
  .dest-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .dest-tag { background:var(--surface3); border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:0.7rem; color:var(--text2); }
  .dest-desc { font-size:0.82rem; color:var(--text2); line-height:1.5; margin-bottom:14px; }
  .dest-footer { display:flex; align-items:center; justify-content:space-between; }
  .best-time { font-size:0.72rem; color:var(--text3); }
  .best-time span { color:var(--accent); font-weight:600; }
</style>
</head>
<body>
<div id="navbar"></div>
<div class="page-wrap">
  <a href="/dashboard.html" class="back-link">← Back to Dashboard</a>
  <div class="page-header">
    <h1>🏔️ Explore India</h1>
    <p>Discover incredible destinations across the length and breadth of India.</p>
  </div>

  <div class="dest-grid" id="destGrid"></div>
</div>

<script src="/app.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavbar('explore');

  const destinations = [
    { name:'Goa', state:'Goa', emoji:'🏖️', tags:['Beach','Nightlife','Seafood'], desc:'Sun, sand and Portuguese heritage. India\'s most popular beach destination.', bestTime:'Nov–Mar' },
    { name:'Jaipur', state:'Rajasthan', emoji:'🏯', tags:['Heritage','Desert','Shopping'], desc:'The Pink City — forts, palaces and vibrant markets of Royal Rajasthan.', bestTime:'Oct–Feb' },
    { name:'Manali', state:'Himachal Pradesh', emoji:'🏔️', tags:['Mountains','Adventure','Snow'], desc:'Snow-capped peaks, river valleys, and gateway to Rohtang Pass.', bestTime:'Oct–Jun' },
    { name:'Varanasi', state:'Uttar Pradesh', emoji:'🕯️', tags:['Spiritual','Ghats','Culture'], desc:'One of the world\'s oldest cities and the spiritual capital of India.', bestTime:'Oct–Mar' },
    { name:'Kerala Backwaters', state:'Kerala', emoji:'🛶', tags:['Backwaters','Ayurveda','Nature'], desc:'Houseboat cruises through tranquil lagoons, rivers and canals.', bestTime:'Sep–Mar' },
    { name:'Ladakh', state:'J&K', emoji:'🌄', tags:['Desert','Monastery','Biking'], desc:'High-altitude cold desert with Buddhist monasteries and stunning landscapes.', bestTime:'Jun–Sep' },
    { name:'Agra', state:'Uttar Pradesh', emoji:'🕌', tags:['History','Taj Mahal','Mughal'], desc:'Home to the Taj Mahal, one of the Seven Wonders of the World.', bestTime:'Oct–Mar' },
    { name:'Rishikesh', state:'Uttarakhand', emoji:'🌊', tags:['Yoga','Rafting','Spiritual'], desc:'Yoga capital of the world, nestled in the foothills of the Himalayas.', bestTime:'Sep–Jun' },
    { name:'Hampi', state:'Karnataka', emoji:'🗿', tags:['Ruins','History','UNESCO'], desc:'Surreal boulder landscape dotted with magnificent ruins of the Vijayanagara Empire.', bestTime:'Oct–Feb' },
    { name:'Darjeeling', state:'West Bengal', emoji:'☕', tags:['Tea','Mountains','Toy Train'], desc:'Famous for its tea gardens and breathtaking views of the Kanchenjunga.', bestTime:'Mar–May, Sep–Nov' },
    { name:'Andaman Islands', state:'A&N Islands', emoji:'🐠', tags:['Snorkeling','Beach','Island'], desc:'Pristine beaches with crystal clear waters and vibrant coral reefs.', bestTime:'Nov–Apr' },
    { name:'Udaipur', state:'Rajasthan', emoji:'💎', tags:['Lakes','Palaces','Romance'], desc:'The City of Lakes — Venice of the East, famous for its royal palaces.', bestTime:'Sep–Mar' },
  ];

  const grid = document.getElementById('destGrid');
  destinations.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'dest-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="dest-emoji-banner">${d.emoji}</div>
      <div class="dest-body">
        <div class="dest-name">${d.name}</div>
        <div class="dest-state">${d.state}</div>
        <div class="dest-tags">${d.tags.map(t=>`<span class="dest-tag">${t}</span>`).join('')}</div>
        <div class="dest-desc">${d.desc}</div>
        <div class="dest-footer">
          <div class="best-time">Best time: <span>${d.bestTime}</span></div>
          <button class="btn btn-primary" style="font-size:0.78rem;padding:7px 14px"
            onclick="event.stopPropagation();window.location.href='/plan-trip.html?dst=${encodeURIComponent(d.name)}'">
            Plan Trip →
          </button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
</script>
</body>
</html>
