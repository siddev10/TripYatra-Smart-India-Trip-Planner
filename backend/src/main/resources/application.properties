# ═══════════════════════════════════════════════════════
#  TripYatra — Spring Boot Configuration
#  Default profile uses H2 (works out of the box)
#  For MySQL: run with --spring.profiles.active=mysql
# ═══════════════════════════════════════════════════════

server.port=5000

# ── H2 In-Memory Database (Default) ──────────────────
spring.datasource.url=jdbc:h2:file:./tripyatra-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Configuration ────────────────────────────────
jwt.secret=tripyatra_super_secret_2024
jwt.expiration=604800000

# ── External API Keys (set in application-local.properties) ─
openai.api.key=${OPENAI_API_KEY:}
gemini.api.key=${GEMINI_API_KEY:}
rail.api.key=${RAIL_API_KEY:}
rail.api.base-url=http://indianrailapi.com/api/v2

# ── Logging ──────────────────────────────────────────
logging.level.com.tripyatra=INFO
