# ═══════════════════════════════════════════════════════
#  TripYatra — MySQL Database Configuration
#  Activate with: --spring.profiles.active=mysql
#  Requires: MySQL server running on localhost:3306
# ═══════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://localhost:3306/tripyatra?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate with MySQL Dialect ─────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# ── Disable H2 Console ──────────────────────────────
spring.h2.console.enabled=false
